<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de la compra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <p class="eyebrow">Plan semanal</p>
        <div class="heading-row">
          <div>
            <h1>Compra de la semana que viene</h1>
            <p id="week-label" class="subheading"></p>
          </div>
          <button id="clear-button" class="clear-button" type="button">
            Compra hecha
          </button>
        </div>

        <section class="quick-picks">
          <div class="section-heading">
            <h2>Productos habituales</h2>
            <p>Toca para añadirlos al momento.</p>
          </div>
          <div id="quick-picks-list" class="quick-picks-list"></div>
        </section>

        <form id="item-form" class="composer">
          <p class="section-label">Añadir algo más</p>
          <label class="sr-only" for="item-input">Añadir producto</label>
          <input
            id="item-input"
            name="item"
            type="text"
            placeholder="Añadir a la lista"
            autocomplete="off"
            maxlength="120"
            required
          />
          <button type="submit">Añadir</button>
        </form>

        <p id="status" class="status" aria-live="polite"></p>

        <ul id="shopping-list" class="shopping-list"></ul>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
